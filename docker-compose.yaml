services:
    db:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-bugtracker}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bugtracker}
            POSTGRES_DB: ${POSTGRES_DB:-bugtracker}
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U bugtracker']
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        build:
            context: ./backend
            target: dev
        ports:
            - '5000:5000'
        env_file:
            - ./backend/.env
        environment:
            DATABASE_URL: ${BACKEND_DATABASE_URL:-postgresql://bugtracker:bugtracker@db:5432/bugtracker}
            FLASK_ENV: development
            CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
        command: >
            sh -c "uv run flask --app run db upgrade &&
            uv run flask --app run run --host 0.0.0.0 --port 5000 --debug"
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - ./backend:/app

    frontend:
        build: ./frontend
        ports:
            - '5173:5173'
        env_file:
            - ./frontend/.env
        environment:
            VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
        command: >
            sh -c "bun install --frozen-lockfile &&
            bun run dev --host 0.0.0.0 --port 5173"
        depends_on:
            - backend
        volumes:
            - ./frontend:/app
            - frontend_node_modules:/app/node_modules

volumes:
    postgres_data:
    frontend_node_modules:
